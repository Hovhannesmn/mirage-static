<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">

  <button class="lightbox-next" onclick="event.stopPropagation();lbNav(1)">&#8250;</button>
</div>

<script src="js/data.js"></script>
<script>
  const params = new URLSearchParams(location.search)
  const id = parseInt(params.get('id'))
  const product = products.find(p => p.id === id)

  if (!product) {
    document.getElementById('productDetail').innerHTML = '<p style="text-align:center;padding:60px;color:var(--mid)">Ապրանքը չի գտնվել։ <a href="index.html">Վերադառնալ</a></p>'
  } else {
    // Update SEO meta
    document.title = `${product.name} — Mirage Handmade`
    document.querySelector('meta[name="description"]').content = product.shortDesc + ' Handmade papier-mache from Armenia. Order via WhatsApp.'
    document.querySelector('meta[property="og:title"]').content = `${product.name} — Mirage Handmade`
    document.querySelector('meta[property="og:description"]').content = product.shortDesc
    document.querySelector('meta[property="og:image"]').content = 'https://miragehandmade.com/' + product.images[0]

    let currentImg = 0
    const imgs = product.images
    const hasVideo = !!product.video

    const sizesHTML = product.sizes.map(s => `<span class="size-badge">${s}</span>`).join('')
    const thumbsHTML = imgs.map((src, i) =>
      `<div class="thumb ${i===0?'active':''}" onclick="setImg(${i})" id="thumb-${i}">
        <img src="${src}" alt="${product.name} ${i+1}" loading="lazy"/>
      </div>`
    ).join('') + (hasVideo ? `<div class="thumb" onclick="showVideo()" id="thumb-video" style="position:relative">
        <img src="${imgs[0]}" alt="Video" loading="lazy" style="filter:brightness(0.6)"/>
        <svg viewBox="0 0 24 24" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:28px;height:28px;fill:#fff;filter:drop-shadow(0 1px 3px rgba(0,0,0,.4))"><path d="M8 5v14l11-7z"/></svg>
      </div>` : '')

    const waText = encodeURIComponent(`Բարև ձեզ։ Կցանկանայի պատվիրել "${product.name}" (${product.price})`)

    document.getElementById('productDetail').innerHTML = `
      <div class="product-gallery">
        <div class="main-img-wrap" onclick="openLightbox(currentImg)">
          <img id="mainImg" src="${imgs[0]}" alt="${product.name}"/>
          <video id="mainVideo" src="${product.video || ''}" controls playsinline style="display:none;width:100%;height:100%;object-fit:cover;border-radius:16px;"></video>
        </div>
        <div class="thumbs">${thumbsHTML}</div>
      </div>
      <div class="product-info">
        <span class="product-tag">${product.tag}</span>
        <h1 class="product-name">${product.name}</h1>
        <div class="product-price">${product.price}</div>
        <div class="divider"></div>
        <div>
          <div class="sizes-title">Չափսեր</div>
          <div class="sizes">${sizesHTML}</div>
        </div>
        <p class="product-desc">${product.fullDesc}</p>
        <div class="divider"></div>
        <div class="action-btns">
          <a href="tel:+37493511288" class="btn-action btn-call">
            <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
            Զանգել
          </a>
          <a href="https://wa.me/37493511288?text=${waText}" target="_blank" rel="noopener" class="btn-action btn-whatsapp">
            <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            WhatsApp
          </a>
          <a href="${FB_LINK}" target="_blank" rel="noopener" class="btn-action btn-facebook">
            <svg viewBox="0 0 24 24"><path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.93-1.956 1.886v2.267h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/></svg>
            Facebook
          </a>
          <a href="${IG_LINK}" target="_blank" rel="noopener" class="btn-action btn-instagram">
            <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
            Instagram
          </a>
        </div>
      </div>`

    window.setImg = (i) => {
      currentImg = i
      const mainImg = document.getElementById('mainImg')
      const mainVideo = document.getElementById('mainVideo')
      mainImg.src = imgs[i]
      mainImg.style.display = ''
      mainVideo.style.display = 'none'
      mainVideo.pause()
      document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'))
      const thumb = document.getElementById('thumb-' + i)
      if (thumb) thumb.classList.add('active')
      mainImg.parentElement.onclick = () => openLightbox(i)
    }

    window.showVideo = () => {
      const mainImg = document.getElementById('mainImg')
      const mainVideo = document.getElementById('mainVideo')
      mainImg.style.display = 'none'
      mainVideo.style.display = 'block'
      mainVideo.play()
      document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'))
      const vt = document.getElementById('thumb-video')
      if (vt) vt.classList.add('active')
      mainImg.parentElement.onclick = null
    }

    window.openLightbox = (i) => {
      currentImg = i
      document.getElementById('lightboxImg').src = imgs[i]
      document.getElementById('lightbox').classList.add('open')
    }
  }

  window.closeLightbox = (e) => { if(e.target === document.getElementById('lightbox')) document.getElementById('lightbox').classList.remove('open') }
  window.lbNav = (dir) => {
    if (!product) return
    currentImg = (currentImg + dir + product.images.length) % product.images.length
    document.getElementById('lightboxImg').src = product.images[currentImg]
  }

  // Related products
  if (product) {
    const related = products.filter(p => p.id !== id).slice(0, 4)
    const rg = document.getElementById('relatedGrid')
    related.forEach(p => {
      rg.innerHTML += `
      <a class="card" href="product.html?id=${p.id}">
        <div class="card-img"><span class="card-tag">${p.tag}</span><img src="${p.images[0]}" alt="${p.name}" loading="lazy"/></div>
        <div class="card-body"><h3>${p.name}</h3><p>${p.shortDesc}</p><div class="price">${p.price}</div></div>
      </a>`
    })
  }
</script>
